# ─────────────────────────────────────────────
#  Job Scraper — User Preferences
#  Edit this file to control what jobs you get notified about.
#  No code changes needed.
# ─────────────────────────────────────────────

# Keywords that must appear in the job title or description (case-insensitive).
# A job matches if ANY of these keywords match (OR logic).
# To require multiple keywords, use a phrase: "senior python" instead of two items.
keywords:
  - python
  - fastapi
  - langchain
  - langgraph
  - backend engineer
  - ai engineer
  - machine learning engineer
  - llm
  - node.js
  - react
  - typescript
  - agentic AI

# Job title must match at least one of these role types (substring match, optional).
# Leave empty [] to skip this filter.
role_types:
  - engineer
  - developer
  - backend
  - frontend
  - ml
  - ai

# ─── Location filter ─────────────────────────
# Set remote_only: true to only get remote jobs.
# If remote_only is false, location_keywords filters by city/country string.
remote_only: false
location_keywords:
  - india
  - bangalore
  - bengaluru
  - mumbai
  - pune
  - hyderabad
  - delhi
  - ncr
  - chennai
  - noida
  - gurgaon
  - gurugram
  - remote

# ─── Salary filter (optional) ─────────────────
# Only notify if the job posts a salary AND it meets the minimum.
# Set to 0 to disable. Currency varies by source — treat as approximate signal.
min_salary: 0          # e.g. 80000
salary_currency: "INR" # informational only — not converted

# ─── Experience level ─────────────────────────
# Leave empty [] to get all levels.
# Options: junior, mid, senior, lead, staff, principal, any
experience_levels:
  - mid
  - senior
  - lead

# ─── Tag / category filter (RemoteOK uses tags) ───
# Leave empty [] to skip.
tags:
  - python
  - backend
  - api
  - devops
  - ai

# ─── Sources to enable ────────────────────────
# Each source has 'enabled' (bool) and 'frequency' (scheduling cadence).
# Frequencies: every_run, every_8h, every_12h, daily
sources:
  remoteok:
    enabled: true
    frequency: every_run
  weworkremotely:
    enabled: true
    frequency: every_run
  arbeitnow:
    enabled: true
    frequency: every_run
  adzuna:
    enabled: false           # Requires ADZUNA_APP_ID & ADZUNA_APP_KEY env vars
    frequency: every_8h
  reddit:
    enabled: true
    frequency: every_run
  google_jobs:
    enabled: true            # Requires SERPAPI_KEY env var
    frequency: daily
  hackernews:
    enabled: true
    frequency: every_run
  jobspy:
    enabled: true
    frequency: daily

# ─── Reddit config ────────────────────────────
reddit_subreddits:
  - developersIndia
  - Indiajobs
  - ITjobsinindia
  - IndiaCareers

# ─── Google Jobs config (via SerpApi) ─────────
google_jobs_queries:
  - "software engineer India"
  - "python developer India"
  - "backend engineer India"
  - "AI engineer India"
  - "fullstack developer India"

# ─── JobSpy config ────────────────────────────
jobspy_sites:
  - indeed
  - linkedin
  - glassdoor

# ─── Notification settings ────────────────────
# Style: 'digest' groups jobs into a single message, 'individual' sends one per job
notification_style: digest
max_jobs_per_digest: 10

# Max jobs to notify per run (prevents flooding on first run)
max_notifications_per_run: 10

# Include job description snippet in the Telegram message?
include_description_snippet: true
description_snippet_length: 280  # characters

# Send a "no new jobs found" message if nothing matched?
notify_on_no_results: false
