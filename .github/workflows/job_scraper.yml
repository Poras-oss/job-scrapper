name: Job Scraper & Telegram Notifier

on:
  schedule:
    # Runs every 3 hours — adjust to taste (cron syntax: minute hour dom month dow)
    - cron: "0 */3 * * *"
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit seen_jobs.json dedup cache back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional — only needed if you enable the Adzuna source
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Optional — only needed if you enable the Google Jobs source (SerpApi)
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python -m job_scraper.scraper

      - name: Commit updated dedup cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json last_run.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs & last_run cache [skip ci]"
          git push
